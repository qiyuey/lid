name: Lid
options:
  bundleIdPrefix: top.qiyuey
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Manual

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3

targets:
  Lid:
    type: application
    platform: macOS
    sources:
      - Sources/Lid
      - Sources/Shared
      - Resources/Assets.xcassets
    info:
      path: Sources/Lid/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Lid
        CFBundleDisplayName: Lid
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: "© 2026 qiyuey. Portions © 2026 Nghia Luong."
        SUFeedURL: https://raw.githubusercontent.com/qiyuey/lid/main/docs/appcast.xml
        SUPublicEDKey: dckHUqDIcxNZCpJR5HErR90BA2jfh4n9VKz1Ne7kRF4=
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        MARKETING_VERSION: "2026.7.13"
        CURRENT_PROJECT_VERSION: "2026.7.13"
        PRODUCT_NAME: Lid
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Debug builds get a `.dev` bundle id so a dev build coexists with the
        # released app — separate UserDefaults and login item.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: top.qiyuey.lid.dev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: top.qiyuey.lid
    dependencies:
      - package: Sparkle
        product: Sparkle

  LidTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/LidTests
      - Sources/Shared
      - Sources/Lid/Localization.swift
      - Sources/Lid/PowerController.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: top.qiyuey.lidTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Lid:
    build:
      targets:
        Lid: all
    run:
      config: Debug
    archive:
      config: Release
  Lid-CI:
    build:
      targets:
        Lid: all
        LidTests: [test]
    test:
      targets:
        - LidTests
