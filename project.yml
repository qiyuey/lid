name: Lidless
options:
  bundleIdPrefix: com.nghialuong
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: TAFDRXJZSR
    CODE_SIGN_STYLE: Automatic

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Lidless:
    type: application
    platform: macOS
    sources:
      - Sources/Lidless
      - Sources/Shared
      - Resources/Assets.xcassets
    info:
      path: Sources/Lidless/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Lidless
        CFBundleDisplayName: Lidless
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "© 2026 Nghia Luong"
        SUFeedURL: https://raw.githubusercontent.com/nghialuong/Lidless/main/docs/appcast.xml
        SUPublicEDKey: pmOUhSI4qLDIbgndphAMYGc/oZJIk9Nw9KdEcmJBSOY=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Debug builds get a `.dev` bundle id so a dev build coexists with the
        # released app — separate UserDefaults, login item, and helper daemon.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidless.dev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidless
    dependencies:
      - target: LidlessHelper
        copy:
          destination: executables
      - package: Sparkle
        product: Sparkle
    postBuildScripts:
      # Generate the privileged helper's LaunchDaemon plist from the app's bundle
      # id so the Release and `.dev` builds register isolated daemons. Runs before
      # the app is code-signed, so the plist is sealed into the bundle.
      - name: Generate helper LaunchDaemon plist
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          APP_ID="${PRODUCT_BUNDLE_IDENTIFIER}"
          HELPER_ID="${APP_ID}.helper"
          DEST="${CODESIGNING_FOLDER_PATH}/Contents/Library/LaunchDaemons"
          mkdir -p "$DEST"
          PLIST="${DEST}/${HELPER_ID}.plist"
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key><string>'"${HELPER_ID}"'</string>
              <key>BundleProgram</key><string>Contents/MacOS/LidlessHelper</string>
              <key>MachServices</key><dict><key>'"${HELPER_ID}"'</key><true/></dict>
              <key>AssociatedBundleIdentifiers</key><array><string>'"${APP_ID}"'</string></array>
              <key>EnvironmentVariables</key><dict><key>LIDLESS_MACH_LABEL</key><string>'"${HELPER_ID}"'</string></dict>
          </dict>
          </plist>' > "$PLIST"
          plutil -lint "$PLIST"

  LidlessHelper:
    type: tool
    platform: macOS
    sources:
      - Sources/Helper
      - Sources/Shared
    settings:
      base:
        PRODUCT_NAME: LidlessHelper
        ENABLE_HARDENED_RUNTIME: YES
        # The helper is embedded into the app bundle via the Lidless target's
        # `copy: executables` dependency. Without this, the tool target is also
        # installed to Products/usr/local/bin in the archive, leaving two install
        # products so Xcode writes no ApplicationProperties — which makes
        # `xcodebuild -exportArchive` reject every distribution method.
        SKIP_INSTALL: YES
        # Embed an Info.plist (with CFBundleIdentifier) into the tool binary.
        # SMAppService daemons need this code identity to form the launch
        # constraint (LWCR) that ties the daemon to the app; without it macOS
        # refuses to exec the daemon ("could not find and/or execute program"
        # / copy_bundle_path error) and the helper never launches.
        GENERATE_INFOPLIST_FILE: YES
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
      configs:
        # Helper bundle id tracks the app's (`<app id>.helper`) per build config.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidless.dev.helper
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidless.helper

  LidlessTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/LidlessTests
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidlessTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Lidless:
    build:
      targets:
        Lidless: all
    run:
      config: Debug
    archive:
      config: Release
  Lidless-CI:
    build:
      targets:
        Lidless: all
        LidlessHelper: all
        LidlessTests: [test]
    test:
      targets:
        - LidlessTests
