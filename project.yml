name: Lidless
options:
  bundleIdPrefix: com.nghialuong
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: TAFDRXJZSR
    CODE_SIGN_STYLE: Automatic

targets:
  Lidless:
    type: application
    platform: macOS
    sources:
      - Sources/Lidless
      - Sources/Shared
      - Resources/Assets.xcassets
      - path: Resources/com.nghialuong.lidless.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    info:
      path: Sources/Lidless/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Lidless
        CFBundleDisplayName: Lidless
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "© 2026 Nghia Luong"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidless
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: LidlessHelper
        copy:
          destination: executables

  LidlessHelper:
    type: tool
    platform: macOS
    sources:
      - Sources/Helper
      - Sources/Shared
    settings:
      base:
        PRODUCT_NAME: LidlessHelper
        PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidless.helper
        ENABLE_HARDENED_RUNTIME: YES

  LidlessTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/LidlessTests
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nghialuong.lidlessTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Lidless:
    build:
      targets:
        Lidless: all
    run:
      config: Debug
    archive:
      config: Release
  Lidless-CI:
    build:
      targets:
        Lidless: all
        LidlessHelper: all
        LidlessTests: [test]
    test:
      targets:
        - LidlessTests
